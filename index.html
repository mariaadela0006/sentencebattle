<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Teacher Adel's Sentence Battle!</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #0a0a1a;
            --p1-color: #ff2e63; 
            --p2-color: #08d9d6; 
            --accent-glow: #7000ff; 
            --panel-bg: rgba(16, 16, 32, 0.85);
            --text-light: #ffffff;
            --hero-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
        }
        
        body { 
            margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; 
            background: url('battle.gif') center/cover no-repeat fixed; 
            color: var(--text-light); 
            overflow: hidden; -webkit-user-select: none; user-select: none;
            width: 100vw; height: 100vh;
        }

        .global-controls {
            position: fixed; top: 15px; right: 20px;
            display: flex; align-items: center; gap: 10px; z-index: 9999;
        }

        .volume-control-wrapper {
            display: flex; align-items: center; background: var(--panel-bg);
            border-radius: 30px; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); transition: all 0.3s;
        }
        
        #volume-slider {
            width: 0; opacity: 0; transition: all 0.3s; cursor: pointer;
            accent-color: var(--accent-glow); margin-left: 0;
        }

        .volume-control-wrapper:hover #volume-slider {
            width: 100px; opacity: 1; margin-left: 10px;
        }

        .quit-btn-container { 
            position: fixed; top: 15px; left: 20px; z-index: 9999; 
        }

        .screen { 
            display: none; 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10; 
            box-sizing: border-box; 
            background: radial-gradient(circle, rgba(10,10,26,0.4) 0%, rgba(10,10,26,0.8) 100%);
        }
        
        .main-title {
            font-family: 'Bungee Spice', cursive;
            font-size: 85px; text-align: center; margin-bottom: 30px; line-height: 1.1;
            filter: drop-shadow(0 0 15px rgba(255,152,0,0.5)); -webkit-text-stroke: 2px #000;
        }

        #intro-screen { display: flex; }
        #char-select-screen { padding: 10px; justify-content: flex-start; padding-top: 60px; }
        
        .char-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; 
            width: 95%; max-width: 1400px; margin: 0 auto; flex-grow: 1; align-content: center;
        }
        
        .char-card { 
            background: var(--panel-bg); border: 3px solid rgba(255,255,255,0.1); 
            border-radius: 20px; padding: 10px; cursor: pointer; text-align: center; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            aspect-ratio: 1 / 1; backdrop-filter: blur(10px); box-shadow: var(--hero-shadow);
        }
        
        .char-card img { width: 90%; height: 80%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .char-card:hover { transform: scale(1.05) translateY(-5px); border-color: var(--accent-glow); box-shadow: 0 0 30px var(--accent-glow); }
        .char-card.selected-p1 { border: 4px solid var(--p1-color); background: rgba(255,46,99,0.2); box-shadow: 0 0 30px var(--p1-color); }
        .char-card.selected-p2 { border: 4px solid var(--p2-color); background: rgba(8,217,214,0.2); box-shadow: 0 0 30px var(--p2-color); }

        .bottom-action-bar { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; width: 100%; }

        .mode-selector { display: flex; gap: 10px; }
        .mode-btn {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            color: white; padding: 15px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Fredoka';
        }
        .mode-btn.active { border-color: var(--accent-glow); background: var(--accent-glow); box-shadow: 0 0 15px var(--accent-glow); }

        #game-screen { display: none; flex-direction: row; background: transparent; }
        
        .player-side { 
            flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; 
            overflow: visible; 
        }
        
        .health-bar-container { 
            width: 85%; height: 26px; background: #111; border-radius: 6px; margin: 85px auto 5px auto;
            overflow: hidden; border: 2px solid #333; z-index: 20; box-shadow: inset 0 0 10px #000;
            flex-shrink: 0;
        }
        
        .health-fill { 
            width: 100%; height: 100%; background: linear-gradient(90deg, #00f2ff, #0061ff); 
            transition: width 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); box-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }
        
        .damage-flash-screen { background: rgba(255, 46, 99, 0.3) !important; }
        .damage-flash-bar { animation: bar-hit 0.4s; }
        @keyframes bar-hit { 0% { background: #fff; } 100% { background: #ff2e63; } }

        .avatar-stats-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 0;
            position: relative;
        }

        .avatar-wrapper {
            width: 380px; height: 380px; position: relative; 
            z-index: 1000; 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .avatar-display { 
            width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; 
            background-position: center bottom; animation: rocking 3s ease-in-out infinite;
        }

        @keyframes rocking { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-12px) rotate(1deg); } }
        .shiver { animation: shiver-effect 0.1s linear infinite !important; }
        @keyframes shiver-effect { 0% { transform: translate(-6px, -3px); } 25% { transform: translate(6px, 0px); } 100% { transform: translate(0px, 0px); } }

        .character-info {
            text-align: center;
            margin-top: 5px;
            z-index: 1001;
        }

        .character-name {
            font-weight: bold; 
            font-size: 24px; 
            color: var(--p1-color); 
            text-transform: uppercase; 
            display: block;
        }

        #side-1 .character-name {
            color: var(--p2-color);
        }

        .quiz-container { 
            padding: 10px; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; 
            z-index: 110; margin-bottom: 20px; transition: opacity 0.5s, filter 0.5s; width: 100%;
            flex-shrink: 0;
        }
        
        .quiz-container.waiting { opacity: 0.2; filter: grayscale(1); pointer-events: none; }

        .question-box { 
            font-size: 52px; text-align: center; margin-bottom: 15px; min-height: 75px; 
            background: rgba(0,0,0,0.85); padding: 18px; border-radius: 12px; width: 92%; 
            border-left: 5px solid var(--accent-glow); color: #00ffcc; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            word-wrap: break-word; font-weight: bold;
            line-height: 1.25;
        }

        .quiz-content-row { display: flex; flex-direction: column; gap: 15px; width: 92%; align-items: center; position: relative; }

        .q-image-square {
            width: 140px; height: 140px; background: rgba(0,0,0,0.5); 
            border: 2px solid var(--accent-glow); border-radius: 12px; display: none;
            background-size: contain; background-position: center; background-repeat: no-repeat;
        }

        .options-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; width: 100%; }
        
        .option-btn { 
            padding: 14px 28px; border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; 
            font-family: 'Fredoka'; font-size: 42px; font-weight: bold; cursor: pointer; 
            background: linear-gradient(180deg, #2a2a4a 0%, #16162d 100%); 
            color: #fff; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .option-btn:hover { background: var(--accent-glow); transform: translateY(-2px); border-color: #fff; }
        .option-btn:disabled { opacity: 0.3; cursor: default; transform: none; filter: grayscale(1); }
        
        .option-btn.wrong-flash {
            background: linear-gradient(180deg, #ff1744 0%, #b71c1c 100%) !important;
            border-color: #ff8a80 !important;
            box-shadow: 0 0 20px #ff1744 !important;
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .freeze-overlay {
            position: absolute;
            inset: -10px;
            background: rgba(10, 20, 44, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            border: 3px solid #08d9d6;
            box-shadow: 0 0 25px rgba(8, 217, 214, 0.6);
        }
        .freeze-title {
            font-size: 38px;
            color: #08d9d6;
            font-weight: bold;
            text-shadow: 0 0 12px rgba(8, 217, 214, 0.8);
            letter-spacing: 2px;
        }
        .freeze-subtitle {
            font-size: 24px;
            color: #ffffff;
            margin-top: 5px;
            font-weight: bold;
        }

        @media (max-height: 900px) {
            .health-bar-container {
                margin: 60px auto 5px auto;
            }
            .avatar-wrapper {
                width: 320px;
                height: 320px;
            }
            .question-box {
                font-size: 44px;
                min-height: 65px;
                padding: 12px;
            }
            .option-btn {
                font-size: 36px;
                padding: 12px 24px;
            }
        }

        @media (max-height: 768px) {
            .health-bar-container {
                margin: 50px auto 5px auto;
            }
            .avatar-wrapper {
                width: 240px;
                height: 240px;
            }
            .question-box {
                font-size: 36px;
                min-height: 55px;
                padding: 10px;
                margin-bottom: 8px;
            }
            .option-btn {
                font-size: 28px;
                padding: 10px 20px;
            }
            .quiz-container {
                margin-bottom: 10px;
            }
        }

        .round-btn { width: 50px; height: 50px; border-radius: 50%; background: none; color: white; border: none; font-size: 24px; cursor: pointer; }
        
        .btn { 
            padding: 15px 35px; border: none; border-radius: 50px; cursor: pointer; 
            font-weight: bold; font-family: 'Fredoka'; font-size: 18px;
            background: linear-gradient(45deg, var(--accent-glow), #4e00b3);
            color: white; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(112,0,255,0.4); transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        
        #settings-modal { display: none; position: fixed; z-index: 10000; inset: 0; background: rgba(0,0,0,0.95); overflow-y: auto; padding: 20px; }
        .modal-content { background: #1a1a2e; color: #fff; margin: 20px auto; padding: 30px; border-radius: 24px; max-width: 900px; position: relative; border: 1px solid var(--accent-glow); }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 35px; cursor: pointer; color: var(--p1-color); font-weight: bold; }
        .sentence-row { background: #252545; padding: 20px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #3d3d6d; position: relative; }
        
        .armory-img-preview {
            width: 80px; height: 80px; border: 1px dashed #666; border-radius: 8px;
            background-size: contain; background-position: center; background-repeat: no-repeat;
            cursor: pointer; position: relative; background-color: #111; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .armory-img-preview:hover::after {
            content: 'UPLOAD'; position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop src="battlebg.mp3"></audio>
    <audio id="sfx-p1-attack" src="p1.mp3"></audio>
    <audio id="sfx-p2-attack" src="p2.mp3"></audio>
    <audio id="sfx-p1-lose" src="l1.mp3"></audio>
    <audio id="sfx-p2-lose" src="l2.mp3"></audio>

    <div class="global-controls">
        <button class="round-btn" onclick="toggleFullscreen()" style="background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.2); width: 55px; height: 55px; border-radius: 50%; backdrop-filter: blur(5px);">⛶</button>
        <div class="volume-control-wrapper">
            <button class="round-btn" id="music-toggle" onclick="toggleMusic()">🔊</button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" oninput="changeVolume(this.value)">
        </div>
    </div>

    <div id="intro-screen" class="screen">
        <h1 class="main-title">TEACHER ADEL'S<br>SENTENCE BATTLE!</h1>
        <div style="display:flex; gap:20px;">
            <button class="btn" style="background: linear-gradient(45deg, #00c853, #b2ff59); color:#000;" onclick="showCharSelect()">Enter Arena ▶</button>
            <button class="btn" style="background: #333;" onclick="openSettings()">Armory ⚙</button>
        </div>
    </div>

    <div id="char-select-screen" class="screen">
        <div class="quit-btn-container"><button class="btn" style="background:#333;" onclick="goBackToStart()">⬅ Retreat</button></div>
        <h2 style="font-size:36px; margin: 10px 0; text-shadow: 0 0 10px var(--accent-glow); text-transform:uppercase; letter-spacing:3px;">Select Your Fighters</h2>
        <div style="display: flex; gap: 30px; margin-bottom: 15px;">
            <div id="p1-indicator" style="color: var(--p1-color); font-weight: bold; font-size: 22px; background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 50px; border: 2px solid var(--p1-color);">P1: SCANNING...</div>
            <div id="p2-indicator" style="color: var(--p2-color); font-weight: bold; font-size: 22px; background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 50px; border: 2px solid var(--p2-color);">P2: WAITING...</div>
        </div>
        <div class="char-grid" id="char-grid"></div>
        <div class="bottom-action-bar">
            <div class="mode-selector" style="display:none;"> <!-- Hidden but preserved to maintain mode functionality -->
                <button id="mode-simul" class="mode-btn active" onclick="setMode('simultaneous')">SIMULTANEOUS</button>
                <button id="mode-turn" class="mode-btn" onclick="setMode('turn')">TURN-BASED</button>
            </div>
            <button id="start-battle-btn" class="btn" style="visibility:hidden; padding: 20px 60px; font-size:24px;" onclick="saveAndStart()">INITIALIZE COMBAT!</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="quit-btn-container"><button class="btn" style="background:rgba(0,0,0,0.6); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);" onclick="goBackToStart()">⬅ QUIT</button></div>
        
        <!-- PLAYER 1 ARENA -->
        <div class="player-side" id="side-0">
            <div class="health-bar-container"><div id="hp-0" class="health-fill"></div></div>
            <div class="avatar-stats-container">
                <div class="avatar-wrapper" id="wrapper-0"><div class="avatar-display" id="avatar-0"></div></div>
                <div class="character-info">
                    <span id="name-0" class="character-name">Striker One</span>
                </div>
            </div>
            
            <div class="quiz-container" id="quiz-cont-0">
                <div class="question-box" id="q-0">...</div>
                <div class="quiz-content-row">
                    <div class="freeze-overlay" id="freeze-0">
                        <div class="freeze-title">❄️ FROZEN ❄️</div>
                        <div class="freeze-subtitle" id="freeze-timer-0">3s Remaining</div>
                    </div>
                    <div id="img-q-0" class="q-image-square"></div>
                    <div class="options-grid" id="opt-0"></div>
                </div>
            </div>
        </div>
        
        <!-- PLAYER 2 ARENA -->
        <div class="player-side" id="side-1">
            <div class="health-bar-container"><div id="hp-1" class="health-fill"></div></div>
            <div class="avatar-stats-container">
                <div class="avatar-wrapper" id="wrapper-1"><div class="avatar-display" id="avatar-1"></div></div>
                <div class="character-info">
                    <span id="name-1" class="character-name">Striker Two</span>
                </div>
            </div>
            
            <div class="quiz-container" id="quiz-cont-1">
                <div class="question-box" id="q-1">...</div>
                <div class="quiz-content-row">
                    <div class="freeze-overlay" id="freeze-1">
                        <div class="freeze-title">❄️ FROZEN ❄️</div>
                        <div class="freeze-subtitle" id="freeze-timer-1">3s Remaining</div>
                    </div>
                    <div id="img-q-1" class="q-image-square"></div>
                    <div class="options-grid" id="opt-1"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="custom-alert" style="display:none; position:fixed; z-index:20000; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
        <div style="background:#1a1a2e; border: 2px solid var(--accent-glow); padding:30px; border-radius:20px; text-align:center; max-width:400px; width:90%;">
            <h3 id="alert-title" style="color:var(--p1-color); font-size:24px; margin-top:0;">ALERT</h3>
            <p id="alert-message" style="color:#fff; font-size:18px; margin-bottom:25px;"></p>
            <button class="btn" onclick="closeCustomAlert()">OK</button>
        </div>
    </div>

    <div id="custom-confirm" style="display:none; position:fixed; z-index:20000; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
        <div style="background:#1a1a2e; border: 2px solid var(--accent-glow); padding:30px; border-radius:20px; text-align:center; max-width:400px; width:90%;">
            <h3 style="color:var(--p2-color); font-size:24px; margin-top:0;">CONFIRM</h3>
            <p id="confirm-message" style="color:#fff; font-size:18px; margin-bottom:25px;"></p>
            <div style="display:flex; gap:15px; justify-content:center;">
                <button class="btn" id="confirm-yes-btn" style="background:#4CAF50;">YES</button>
                <button class="btn" onclick="closeCustomConfirm()" style="background:#333;">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen" style="background: rgba(0,0,0,0.9);">
        <h1 id="winner-announcement" style="font-family: 'Bungee Spice', cursive; font-size: 80px; text-align: center;"></h1>
        <button class="btn" style="padding: 25px 60px; font-size:28px;" onclick="goBackToStart()">Restart Protocol</button>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeSettings()">×</span>
            <h2 style="color: var(--accent-glow); margin-top: 0; text-align: center; text-transform: uppercase;">Sentence Bank</h2>
            <div style="display: flex; gap: 10px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; margin-bottom: 20px; justify-content: center;">
                <button class="btn" style="background:#2196F3; font-size:14px;" onclick="exportData()">Export Bank</button>
                <button class="btn" style="background:#4CAF50; font-size:14px;" onclick="document.getElementById('import-file').click()">Import Bank</button>
                <button class="btn" style="background:var(--p1-color); font-size:14px;" onclick="resetData()">Wipe Memory</button>
                <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(this)">
            </div>
            <div id="sentence-container"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn" onclick="addSentenceRow()" style="flex: 1; background: #252545; border: 1px solid var(--accent-glow);">+ New Sentence</button>
                <button class="btn" onclick="closeSettings()" style="flex: 1;">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_BANK = [
            { fullSentence: "In summer, I will wear shorts.", distractor: "sweater", image: null },
            { fullSentence: "It's sunny, I will wear sunglasses.", distractor: "scarf", image: null },
            { fullSentence: "In winter, I will wear a jacket.", distractor: "shorts", image: null },
            { fullSentence: "It's rainy, I will wear a rain coat.", distractor: "sunglasses", image: null },
            { fullSentence: "In spring, I will wear a t-shirt.", distractor: "gloves", image: null },
            { fullSentence: "It's windy, I will wear a sweater.", distractor: "skirt", image: null },
            { fullSentence: "In fall, I will wear a scarf.", distractor: "t-shirt", image: null },
            { fullSentence: "It's cloudy, I will wear a dress.", distractor: "rain boots", image: null }
        ];

        let sentenceBank = JSON.parse(JSON.stringify(DEFAULT_BANK));
        let playerPools = [[], []]; 
        let playerSelection = [null, null];
        let gameData = [
            { hp: 100, currentProgress: [], targetWords: [] }, 
            { hp: 100, currentProgress: [], targetWords: [] }
        ];
        
        let damagePerHit = 20; // 5 hits to win
        let gameMode = 'simultaneous';
        let currentTurn = 0;
        let isGameOver = false;

        let incorrectStreak = [0, 0];
        let freezeTimeRemaining = [0, 0];
        let freezeIntervals = [null, null];

        window.onload = () => { renderCharSelect(); renderSentenceBank(); const bgm = document.getElementById('bg-music'); bgm.volume = 0.5; };

        function customAlert(msg) {
            document.getElementById('alert-message').innerText = msg;
            document.getElementById('custom-alert').style.display = 'flex';
        }
        function closeCustomAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }
        function customConfirm(msg, callback) {
            document.getElementById('confirm-message').innerText = msg;
            const yesBtn = document.getElementById('confirm-yes-btn');
            yesBtn.onclick = () => {
                closeCustomConfirm();
                callback();
            };
            document.getElementById('custom-confirm').style.display = 'flex';
        }
        function closeCustomConfirm() {
            document.getElementById('custom-confirm').style.display = 'none';
        }

        function setMode(m) {
            gameMode = m;
            document.getElementById('mode-simul').classList.toggle('active', m === 'simultaneous');
            document.getElementById('mode-turn').classList.toggle('active', m === 'turn');
        }

        function renderCharSelect() {
            const grid = document.getElementById('char-grid');
            let html = "";
            for(let i=1; i<=10; i++) html += `<div class="char-card" id="char-${i}" onclick="selectChar(${i})"><img src="${i}.png"><div style="font-size:16px; margin-top:12px; color:rgba(255,255,255,0.7); font-weight:bold; letter-spacing:1px;">UNIT-${i.toString().padStart(2, '0')}</div></div>`;
            grid.innerHTML = html;
        }

        function selectChar(num) {
            if (playerSelection[0] === null) {
                playerSelection[0] = num; document.getElementById(`char-${num}`).classList.add('selected-p1');
                document.getElementById('p1-indicator').innerText = "P1: ONLINE";
                document.getElementById('p2-indicator').innerText = "P2: SCANNING...";
            } else if (playerSelection[1] === null && playerSelection[0] !== num) {
                playerSelection[1] = num; document.getElementById(`char-${num}`).classList.add('selected-p2');
                document.getElementById('p2-indicator').innerText = "P2: ONLINE";
                document.getElementById('start-battle-btn').style.visibility = 'visible';
            }
        }

        function showCharSelect() { 
            document.getElementById('intro-screen').style.display = 'none'; 
            document.getElementById('char-select-screen').style.display = 'flex'; 
        }

        function saveAndStart() {
            isGameOver = false;
            incorrectStreak = [0, 0];
            freezeTimeRemaining = [0, 0];
            
            for(let i = 0; i < 2; i++) {
                if (freezeIntervals[i]) {
                    clearInterval(freezeIntervals[i]);
                    freezeIntervals[i] = null;
                }
                document.getElementById(`freeze-${i}`).style.display = 'none';
            }

            damagePerHit = 20;
            
            const shuffled = [...sentenceBank].sort(() => Math.random() - 0.5);
            playerPools[0] = JSON.parse(JSON.stringify(shuffled));
            playerPools[1] = JSON.parse(JSON.stringify(shuffled));

            document.getElementById('char-select-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            gameData = [
                { hp: 100, currentProgress: [], targetWords: [] }, 
                { hp: 100, currentProgress: [], targetWords: [] }
            ];
            
            document.getElementById('avatar-0').style.backgroundImage = `url(${playerSelection[0]}.png)`;
            document.getElementById('avatar-1').style.backgroundImage = `url(${playerSelection[1]}.png)`;
            
            applyMirroring(0, document.getElementById('wrapper-0')); 
            applyMirroring(1, document.getElementById('wrapper-1'));
            
            updateHP(0, 0); updateHP(1, 0);
            loadQuestion(0); loadQuestion(1);

            if(gameMode === 'turn') { currentTurn = 0; updateTurnUI(); }
            else { 
                document.getElementById('quiz-cont-0').classList.remove('waiting'); 
                document.getElementById('quiz-cont-1').classList.remove('waiting'); 
            }
        }

        function updateTurnUI() {
            if(gameMode !== 'turn' || isGameOver) return;
            document.getElementById('quiz-cont-0').classList.toggle('waiting', currentTurn !== 0);
            document.getElementById('quiz-cont-1').classList.toggle('waiting', currentTurn !== 1);
        }

        function applyMirroring(pIdx, el) {
            const charNum = playerSelection[pIdx];
            if(!charNum) return;
            const isDefaultRight = charNum <= 5;
            const scale = (pIdx === 0) ? (isDefaultRight ? 1 : -1) : (isDefaultRight ? -1 : 1);
            el.style.transform = `scaleX(${scale})`;
        }

        function loadQuestion(pIdx) {
            if (isGameOver || !playerPools[pIdx] || playerPools[pIdx].length === 0) return;
            
            const qObj = playerPools[pIdx][0]; 
            gameData[pIdx].targetWords = qObj.fullSentence.trim().split(/\s+/);
            gameData[pIdx].currentProgress = [];
            
            document.getElementById(`q-${pIdx}`).innerText = ""; 
            const imgBox = document.getElementById(`img-q-${pIdx}`);
            if(qObj.image) { 
                imgBox.style.display = 'block'; 
                imgBox.style.backgroundImage = `url(${qObj.image})`; 
            } else {
                imgBox.style.display = 'none';
            }

            let pool = [...gameData[pIdx].targetWords];
            if(qObj.distractor) pool.push(qObj.distractor);
            pool = pool.sort(() => Math.random() - 0.5);

            document.getElementById(`opt-${pIdx}`).innerHTML = pool.map((word, wIdx) => `
                <button class="option-btn" id="p${pIdx}w${wIdx}" onclick="handleWordClick(${pIdx}, '${word.replace(/'/g, "\\'")}', 'p${pIdx}w${wIdx}')">${word}</button>
            `).join('');
        }

        function handleWordClick(pIdx, word, btnId) {
            if (isGameOver) return;
            if (gameMode === 'turn' && pIdx !== currentTurn) return;
            if (freezeTimeRemaining[pIdx] > 0) return; 

            const target = gameData[pIdx].targetWords[gameData[pIdx].currentProgress.length];
            const btn = document.getElementById(btnId);

            if (word === target) {
                gameData[pIdx].currentProgress.push(word);
                btn.disabled = true;
                document.getElementById(`q-${pIdx}`).innerText = gameData[pIdx].currentProgress.join(" ");
                
                if (gameData[pIdx].currentProgress.length === gameData[pIdx].targetWords.length) {
                    processCombat(pIdx, true);
                }
            } else {
                btn.classList.add('wrong-flash');
                setTimeout(() => btn.classList.remove('wrong-flash'), 400);

                processCombat(pIdx, false);
            }
        }

        function triggerFreezePenalty(pIdx) {
            incorrectStreak[pIdx]++;
            const freezeDuration = incorrectStreak[pIdx] * 3; // Scaling increments
            
            freezeTimeRemaining[pIdx] = freezeDuration;
            
            const overlay = document.getElementById(`freeze-${pIdx}`);
            const timerLabel = document.getElementById(`freeze-timer-${pIdx}`);
            
            overlay.style.display = 'flex';
            timerLabel.innerText = `${freezeTimeRemaining[pIdx]}s Remaining`;
            
            if (freezeIntervals[pIdx]) clearInterval(freezeIntervals[pIdx]);
            
            freezeIntervals[pIdx] = setInterval(() => {
                freezeTimeRemaining[pIdx]--;
                
                if (freezeTimeRemaining[pIdx] <= 0) {
                    clearInterval(freezeIntervals[pIdx]);
                    freezeIntervals[pIdx] = null;
                    overlay.style.display = 'none';
                } else {
                    timerLabel.innerText = `${freezeTimeRemaining[pIdx]}s Remaining`;
                }
            }, 1000);
        }

        function processCombat(pIdx, isCorrect) {
            const opponentIdx = pIdx === 0 ? 1 : 0;
            const myWrap = document.getElementById(`wrapper-${pIdx}`);
            const myDisplay = document.getElementById(`avatar-${pIdx}`);
            const charNum = playerSelection[pIdx];

            if (isCorrect) {
                incorrectStreak[pIdx] = 0; 

                document.getElementById(`sfx-p${pIdx+1}-attack`).play();
                myDisplay.style.backgroundImage = `url(${charNum}.gif?t=${Date.now()})`;
                
                let dashDistance = (pIdx === 0) ? 750 : -750; 
                let baseMirror = (pIdx === 0) ? (charNum <= 5 ? 1 : -1) : (charNum <= 5 ? -1 : 1);
                
                myWrap.style.transform = `translateX(${dashDistance}px) scaleX(${baseMirror}) scale(1.1)`;
                
                setTimeout(() => {
                    triggerDamageFeedback(opponentIdx);
                    
                    updateHP(opponentIdx, -damagePerHit);
                    
                    applyMirroring(pIdx, myWrap);
                    myDisplay.style.backgroundImage = `url(${charNum}.png)`;
                    
                    playerPools[pIdx].shift(); 
                    if(playerPools[pIdx].length === 0) {
                        const reshuffled = [...sentenceBank].sort(() => Math.random() - 0.5);
                        playerPools[pIdx] = JSON.parse(JSON.stringify(reshuffled));
                    }
                    if (gameMode === 'turn') { currentTurn = opponentIdx; updateTurnUI(); }
                    loadQuestion(pIdx);
                }, 700);
            } else {
                document.getElementById(`sfx-p${pIdx+1}-lose`).play();
                triggerDamageFeedback(pIdx);
                
                triggerFreezePenalty(pIdx);

                if (gameMode === 'turn') { currentTurn = opponentIdx; updateTurnUI(); }
            }
        }

        function triggerDamageFeedback(pIdx) {
            const side = document.getElementById(`side-${pIdx}`);
            const bar = document.getElementById(`hp-${pIdx}`);
            const avatar = document.getElementById(`avatar-${pIdx}`);
            side.classList.add('damage-flash-screen'); bar.classList.add('damage-flash-bar'); avatar.classList.add('shiver');
            setTimeout(() => { side.classList.remove('damage-flash-screen'); bar.classList.remove('damage-flash-bar'); avatar.classList.remove('shiver'); }, 600);
        }

        function updateHP(pIdx, change) {
            gameData[pIdx].hp = Math.max(0, Math.min(100, gameData[pIdx].hp + change));
            document.getElementById(`hp-${pIdx}`).style.width = gameData[pIdx].hp + '%';
            if (gameData[pIdx].hp <= 0 && !isGameOver) {
                isGameOver = true;
                setTimeout(() => { endGame(pIdx === 0 ? "PLAYER 2" : "PLAYER 1"); }, 1500);
            }
        }

        function endGame(winner) {
            document.getElementById('winner-announcement').innerText = winner + " VICTORIOUS!";
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
        }

        function goBackToStart() {
            isGameOver = false;
            playerSelection = [null, null];

            for(let i = 0; i < 2; i++) {
                if(freezeIntervals[i]) {
                    clearInterval(freezeIntervals[i]);
                    freezeIntervals[i] = null;
                }
                document.getElementById(`freeze-${i}`).style.display = 'none';
            }
            freezeTimeRemaining = [0, 0];
            incorrectStreak = [0, 0];

            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('char-select-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('intro-screen').style.display = 'flex';
            document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected-p1', 'selected-p2'));
            document.getElementById('p1-indicator').innerText = "P1: SCANNING...";
            document.getElementById('p2-indicator').innerText = "P2: WAITING...";
            document.getElementById('start-battle-btn').style.visibility = 'hidden';
            document.getElementById('quiz-cont-0').classList.remove('waiting');
            document.getElementById('quiz-cont-1').classList.remove('waiting');
        }

        function toggleMusic() {
            const bgm = document.getElementById('bg-music');
            if(bgm.paused) { bgm.play(); document.getElementById('music-toggle').innerText = "🔊"; } 
            else { bgm.pause(); document.getElementById('music-toggle').innerText = "🔇"; }
        }

        function changeVolume(val) { document.getElementById('bg-music').volume = val; }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function openSettings() { renderSentenceBank(); document.getElementById('settings-modal').style.display = 'block'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function renderSentenceBank() {
            const container = document.getElementById('sentence-container');
            container.innerHTML = sentenceBank.map((item, qIdx) => `
                <div class="sentence-row">
                    <span onclick="deleteSentence(${qIdx})" style="position:absolute; top:10px; right:15px; cursor:pointer; color:var(--p1-color); font-size:28px; font-weight:bold;">×</span>
                    <div style="display:flex; gap:15px; align-items:start;">
                        <div class="armory-img-preview" id="preview-${qIdx}" style="background-image: url(${item.image || ''})" onclick="triggerImageUpload(${qIdx})">
                             ${!item.image ? '<span style="font-size:10px; color:#666;">IMAGE</span>' : ''}
                        </div>
                        <div style="flex-grow:1;">
                            <label style="font-size:12px; color:var(--p2-color)">FULL SENTENCE (MUST include punctuation like commas and periods):</label>
                            <input type="text" value="${item.fullSentence || ''}" onchange="sentenceBank[${qIdx}].fullSentence=this.value" placeholder="e.g. In summer, I will wear shorts." style="width:95%; padding:8px; background:#111; color:white; border:1px solid #444; border-radius:5px; margin-bottom:10px;">
                            <label style="font-size:12px; color:var(--p1-color)">DISTRACTOR WORD (OPTIONAL):</label>
                            <input type="text" value="${item.distractor || ''}" onchange="sentenceBank[${qIdx}].distractor=this.value" placeholder="e.g. sweater" style="width:95%; padding:8px; background:#111; color:white; border:1px solid #444; border-radius:5px;">
                        </div>
                    </div>
                    <input type="file" id="upload-${qIdx}" style="display:none" accept="image/*" onchange="handleImageUpload(event, ${qIdx})">
                </div>
            `).join('');
        }

        function triggerImageUpload(idx) { document.getElementById(`upload-${idx}`).click(); }
        function handleImageUpload(event, idx) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { sentenceBank[idx].image = e.target.result; renderSentenceBank(); };
                reader.readAsDataURL(file);
            }
        }

        function addSentenceRow() { sentenceBank.push({ fullSentence: "", distractor: "", image: null }); renderSentenceBank(); }
        function deleteSentence(i) { sentenceBank.splice(i, 1); renderSentenceBank(); }
        
        function exportData() {
            const blob = new Blob([JSON.stringify(sentenceBank)], {type: "application/json"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "BattleSentenceData.json"; a.click();
        }
        function importData(input) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                try { 
                    sentenceBank = JSON.parse(e.target.result); 
                    renderSentenceBank(); 
                } catch(err) { 
                    customAlert("Failed to parse imported file!"); 
                } 
            };
            reader.readAsText(input.files[0]);
        }
        function resetData() { 
            customConfirm("Are you sure you want to restore default sentences?", () => {
                sentenceBank = JSON.parse(JSON.stringify(DEFAULT_BANK)); 
                renderSentenceBank();
            }); 
        }
    </script>
</body>
</html>
